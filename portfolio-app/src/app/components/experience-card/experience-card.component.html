<div class="bg-slate-800/50 backdrop-blur-sm border border-slate-700/50 rounded-lg p-8 hover:border-emerald-500/50 transition-all duration-300 hover:shadow-xl hover:shadow-emerald-500/10">
  <!-- Header -->
  <div class="mb-6">
    <div class="flex items-start justify-between mb-2">
      <div>
        <h3 class="text-2xl font-bold text-slate-50 mb-1">{{ experience.role }}</h3>
        <p class="text-lg text-emerald-400 font-semibold">{{ experience.company }}</p>
      </div>
      <span class="text-sm text-slate-400 font-mono">{{ experience.duration }}</span>
    </div>
    <p class="text-sm text-slate-400">{{ experience.location }}</p>
  </div>

  <!-- Description -->
  <p class="text-slate-300 mb-6 leading-relaxed">{{ experience.description }}</p>

  <!-- Projects -->
  <div *ngIf="experience.projects && experience.projects.length > 0" class="mb-6">
    <h4 class="text-lg font-semibold text-slate-50 mb-4 flex items-center">
      <span class="text-emerald-500 mr-2">▸</span>
      Key Projects
    </h4>
    <div *ngFor="let project of experience.projects" class="mb-4 pl-4 border-l-2 border-slate-700">
      <h5 class="font-bold text-slate-100 mb-2">{{ project.name }}</h5>
      <p class="text-sm text-slate-300 mb-2">{{ project.description }}</p>
      <ul class="space-y-1">
        <li *ngFor="let highlight of project.highlights" class="text-sm text-slate-400 flex items-start">
          <span class="text-emerald-500 mr-2 mt-1">•</span>
          <span>{{ highlight }}</span>
        </li>
      </ul>
    </div>
  </div>

  <!-- Achievements -->
  <div *ngIf="experience.achievements && experience.achievements.length > 0" class="mb-6">
    <h4 class="text-lg font-semibold text-slate-50 mb-3 flex items-center">
      <span class="text-emerald-500 mr-2">▸</span>
      Key Achievements
    </h4>
    <ul class="space-y-2">
      <li *ngFor="let achievement of experience.achievements" class="text-sm text-slate-300 flex items-start">
        <span class="text-emerald-500 mr-2 mt-1">✓</span>
        <span>{{ achievement }}</span>
      </li>
    </ul>
  </div>

  <!-- Technologies -->
  <div *ngIf="experience.technologies && experience.technologies.length > 0">
    <h4 class="text-sm font-semibold text-slate-400 mb-2">Technologies Used:</h4>
    <div class="flex flex-wrap gap-2">
      <span *ngFor="let tech of experience.technologies" 
            class="px-3 py-1 text-xs font-mono font-medium bg-midnight-200 text-emerald-400 rounded border border-slate-600">
        {{ tech }}
      </span>
    </div>
  </div>
</div>
