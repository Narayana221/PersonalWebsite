<div class="bg-slate-800/50 backdrop-blur-sm border border-slate-700/50 rounded-lg p-6 hover:border-emerald-500/50 transition-all duration-300 hover:shadow-xl hover:shadow-emerald-500/10 group">
  <!-- Project Header -->
  <div class="flex items-start justify-between mb-4">
    <div class="flex-1">
      <div class="flex items-center gap-3 mb-2">
        <h3 class="text-xl font-bold text-slate-50 group-hover:text-emerald-400 transition-colors">
          {{ project.title }}
        </h3>
        <span *ngIf="project.type === 'hackathon'" 
              class="px-2 py-1 text-xs font-semibold bg-emerald-500/20 text-emerald-400 rounded border border-emerald-500/30">
          Hackathon
        </span>
      </div>
      <p *ngIf="project.subtitle" class="text-sm text-slate-400 mb-3">{{ project.subtitle }}</p>
    </div>
  </div>

  <!-- Description -->
  <p class="text-slate-300 mb-4 leading-relaxed">{{ project.description }}</p>

  <!-- Technologies -->
  <div class="flex flex-wrap gap-2 mb-4">
    <span *ngFor="let tech of project.technologies" 
          class="px-3 py-1 text-xs font-mono font-medium bg-midnight-200 text-emerald-400 rounded border border-slate-600">
      {{ tech }}
    </span>
  </div>

  <!-- Highlights -->
  <div *ngIf="project.highlights && project.highlights.length > 0" class="mb-4">
    <h4 class="text-sm font-semibold text-slate-400 mb-2">Key Highlights:</h4>
    <ul class="space-y-1">
      <li *ngFor="let highlight of project.highlights" class="text-sm text-slate-300 flex items-start">
        <span class="text-emerald-500 mr-2">▹</span>
        <span>{{ highlight }}</span>
      </li>
    </ul>
  </div>

  <!-- Links -->
  <div *ngIf="project.link || project.github" class="flex gap-3 pt-4 border-t border-slate-700/50">
    <a *ngIf="project.link" 
       [href]="project.link" 
       target="_blank"
       class="text-sm text-emerald-500 hover:text-emerald-400 transition-colors flex items-center gap-1">
      <span>View Project</span>
      <span>↗</span>
    </a>
    <a *ngIf="project.github" 
       [href]="project.github" 
       target="_blank"
       class="text-sm text-slate-400 hover:text-slate-300 transition-colors flex items-center gap-1">
      <span>GitHub</span>
      <span>↗</span>
    </a>
  </div>
</div>
