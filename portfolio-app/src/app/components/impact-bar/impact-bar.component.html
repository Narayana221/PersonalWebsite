<div class="grid grid-cols-1 md:grid-cols-3 gap-6 my-12">
  <div *ngFor="let metric of metrics; let i = index" 
       class="relative bg-gradient-to-br from-slate-800/80 to-slate-900/80 backdrop-blur-sm border border-slate-700/50 rounded-lg p-6 overflow-hidden group hover:border-emerald-500/50 transition-all duration-300"
       [style.animation-delay]="i * 0.2 + 's'">
    <!-- Animated Background Effect -->
    <div class="absolute inset-0 bg-gradient-to-r from-emerald-500/0 via-emerald-500/5 to-emerald-500/0 opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
    
    <!-- Content -->
    <div class="relative z-10">
      <div class="flex items-center justify-between mb-3">
        <span class="text-sm font-mono text-slate-400">{{ metric.label }}</span>
        <span *ngIf="metric.icon" class="text-2xl">{{ metric.icon }}</span>
      </div>
      <div class="text-4xl font-bold text-emerald-400 mb-2 font-mono">{{ metric.value }}</div>
      
      <!-- Progress Bar Animation -->
      <div class="h-1 bg-slate-700/50 rounded-full overflow-hidden">
        <div class="h-full bg-gradient-to-r from-emerald-500 to-emerald-400 rounded-full animate-pulse-slow"
             [style.width]="'100%'"></div>
      </div>
    </div>
  </div>
</div>
